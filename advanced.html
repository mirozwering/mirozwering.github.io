<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Google Advanced Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="upper-right">
        <a href="index.html">Google Search</a>
    </nav>

    <div class="advanced-container">
        <h1>Advanced Search</h1>
        <hr>
        <h2 style="font-size: 16px; font-weight: normal; margin-top: 30px;">Find pages with...</h2>
        
        <form action="https://www.google.com/search">
            <table class="advanced-table">
                <tr>
                    <td style="width: 200px;">all these words:</td>
                    <td><input type="text" name="as_q"></td>
                </tr>
                <tr>
                    <td>this exact word or phrase:</td>
                    <td><input type="text" name="as_epq"></td>
                </tr>
                <tr>
                    <td>any of these words:</td>
                    <td><input type="text" name="as_oq"></td>
                </tr>
                <tr>
                    <td>none of these words:</td>
                    <td><input type="text" name="as_eq"></td>
                </tr>
                <tr>
                    <td></td>
                    <td style="text-align: right;">
                        <input type="submit" value="Advanced Search" class="advanced-btn">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
